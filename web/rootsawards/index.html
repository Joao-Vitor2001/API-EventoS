<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roots Awards</title>
  <style>
    body { font-family: Arial; background:#0b0f14; color:#fff; margin:0; padding:20px; }
    .card { background:#111826; padding:16px; border-radius:12px; margin-bottom:12px; }
    input, button { padding:10px; border-radius:10px; border:none; margin-right:8px; }
    button { cursor:pointer; }
    .muted { opacity: .8; font-size: 14px; }
  </style>
</head>
<body>

  <h1>🎖️ Roots-Awards</h1>
  <p class="muted">Crie um award e vote com a galera.</p>

  <div class="card">
    <h2>➕ Criar Award</h2>
    <input id="award-titulo" placeholder="Ex: Amigo mais engraçado" />
    <button onclick="criarAward()">Criar</button>
  </div>

  <div class="card">
    <h2>📋 Lista de Awards</h2>
    <div id="awards-lista"></div>
  </div>

<script>
  const API_BASE = "https://api-eventos-9ket.onrender.com";
  const AWARDS_URL = `${API_BASE}/awards`;

  async function carregarAwards() {
    try {
      const resp = await fetch(AWARDS_URL);
      if (!resp.ok) throw new Error("Falha ao buscar awards");
      const awards = await resp.json();

      const box = document.getElementById("awards-lista");
      box.innerHTML = "";

      if (!awards.length) {
        box.innerHTML = "<p class='muted'>Nenhum award criado ainda.</p>";
        return;
      }

      awards.forEach(a => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <h3>${a.titulo || a.nome || "Award"}</h3>
          <p class="muted">Votos: <b>${a.votos ?? 0}</b></p>
          <button onclick="votarAward('${a.id}')">✅ Votar</button>
        `;
        box.appendChild(div);
      });

    } catch (err) {
      console.error(err);
      alert("Erro ao carregar o Roots-awards. Veja o console (F12).");
    }
  }

  async function criarAward() {
    try {
      const titulo = document.getElementById("award-titulo").value.trim();
      if (!titulo) {
        alert("Digite um título para o award!");
        return;
      }

      const resp = await fetch(AWARDS_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ titulo })
      });

      if (!resp.ok) {
        const txt = await resp.text();
        throw new Error(`Erro ao criar award: ${txt}`);
      }

      document.getElementById("award-titulo").value = "";
      carregarAwards();
    } catch (err) {
      console.error(err);
      alert("Erro ao criar award. Veja o console (F12).");
    }
  }

  async function votarAward(id) {
    try {
      // sua API tem /awards/:id/votar (pelo que você tinha mostrado)
      const resp = await fetch(`${AWARDS_URL}/${id}/votar`, { method: "POST" });

      if (!resp.ok) {
        const txt = await resp.text();
        throw new Error(`Erro ao votar: ${txt}`);
      }

      carregarAwards();
    } catch (err) {
      console.error(err);
      alert("Erro ao votar. Veja o console (F12).");
    }
  }

  carregarAwards();
</script>

</body>
</html>
