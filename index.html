<div id="aba-eventos" class="section active">
    <div class="card">
        <h4 style="margin-top:0; color: var(--dark-green);" id="form-title">📅 Novo Evento</h4>
        <input type="hidden" id="input-id">
        
        <label>Nome do Evento:</label>
        <input type="text" id="input-nome" placeholder="Ex: Churrasco do Roots">
        
        <label>Data:</label>
        <input type="date" id="input-data">
        
        <!-- NOVOS CAMPOS ADICIONADOS AQUI -->
        <label>Local:</label>
        <input type="text" id="input-local" placeholder="Ex: Rua das Flores, 123">
        
        <label>Participantes:</label>
        <input type="text" id="input-participantes" placeholder="Ex: João, Maria, Pedro">
        
        <button class="btn-save" id="btn-confirmar" onclick="salvarEvento()">Confirmar 🚀</button>
        <button id="btn-cancelar" style="display:none; width: 100%; margin-top: 5px; background: #bdc3c7;" onclick="limparForm()">Cancelar Edição</button>
    </div>
    <div id="lista-eventos">Carregando eventos...</div>
</div>

<script>
    const API_URL = 'https://api-eventos-9ket.onrender.com';

    async function carregarEventos() {
        try {
            const res = await fetch(API_URL);
            const eventos = await res.json();
            const divLista = document.getElementById('lista-eventos');
            
            divLista.innerHTML = eventos.map(ev => `
                <div class="card">
                    <strong style="font-size:18px">${ev.nome}</strong><br>
                    <small style="color:var(--dark-green)">🗓️ ${new Date(ev.data).toLocaleDateString('pt-BR')}</small><br>
                    
                    <!-- Exibindo os novos campos no Card -->
                    <div style="margin-top:8px; font-size:14px; color:#555">
                        <strong>📍 Local:</strong> ${ev.local || 'Não informado'}<br>
                        <strong>👥 Participantes:</strong> ${ev.participantes || 'Nenhum'}
                    </div>

                    <div style="margin-top:12px">
                        <button class="btn-edit" onclick="prepararEdicao('${ev.id}', '${ev.nome}', '${ev.data}', '${ev.local}', '${ev.participantes}')">✏️ Editar</button>
                        <button class="btn-del" onclick="deletarEvento('${ev.id}')">🗑️ Excluir</button>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('lista-eventos').innerHTML = "Erro ao carregar eventos.";
        }
    }

    async function salvarEvento() {
        const id = document.getElementById('input-id').value;
        const nome = document.getElementById('input-nome').value;
        const data = document.getElementById('input-data').value;
        const local = document.getElementById('input-local').value; // Captura Local
        const participantes = document.getElementById('input-participantes').value; // Captura Participantes

        if (!nome || !data || !local) return alert("Preencha ao menos Nome, Data e Local!");

        const dados = { nome, data, local, participantes };

        try {
            const metodo = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            const res = await fetch(url, {
                method: metodo,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            if(res.ok) {
                limparForm();
                carregarEventos();
            }
        } catch (e) {
            alert("Erro ao salvar. Verifique se o servidor no Render está online.");
        }
    }

    function prepararEdicao(id, nome, data, local, participantes) {
        document.getElementById('input-id').value = id;
        document.getElementById('input-nome').value = nome;
        document.getElementById('input-data').value = data;
        document.getElementById('input-local').value = local === 'undefined' ? '' : local;
        document.getElementById('input-participantes').value = participantes === 'undefined' ? '' : participantes;
        
        document.getElementById('form-title').innerText = "✏️ Editando Evento";
        document.getElementById('btn-confirmar').innerText = "Salvar Alterações ✅";
        document.getElementById('btn-cancelar').style.display = "block";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function limparForm() {
        document.getElementById('input-id').value = '';
        document.getElementById('input-nome').value = '';
        document.getElementById('input-data').value = '';
        document.getElementById('input-local').value = '';
        document.getElementById('input-participantes').value = '';
        document.getElementById('form-title').innerText = "📅 Novo Evento";
        document.getElementById('btn-confirmar').innerText = "Confirmar 🚀";
        document.getElementById('btn-cancelar').style.display = "none";
    }

    carregarEventos();
</script>
